name: Node CI (reusable)

# Centralized, versioned CI guard for Twilio JS/TS SDKs (ADR 1634 Rule 3b).
# Covers npm / yarn / pnpm and single-repo or monorepo layouts. Consumers call
# this by SHA (org policy pins actions/workflows to a full commit SHA):
#
#   jobs:
#     ci:
#       uses: twilio/sdk-actions/.github/workflows/node-ci.yml@<sha>  # v1.2.3
#       permissions:
#         contents: read
#         id-token: write   # required for Artifactory OIDC on org (non-fork) runs
#       with:
#         package-manager: npm       # npm | yarn | pnpm
#         node-versions: '[22, 24]'
#
# Fork PRs have no Artifactory secret, so the OIDC step is skipped and deps
# resolve from public npm on a GitHub-hosted runner.

on:
  workflow_call:
    inputs:
      package-manager:
        description: 'npm | yarn | pnpm (drives corepack + default install/cache)'
        type: string
        default: 'npm'
      node-versions:
        description: 'JSON array of Node versions for the test matrix'
        type: string
        default: '[22, 24]'
      org-runner:
        description: 'Runner label for org (non-fork) builds'
        type: string
        default: 'ubuntu-x64'
      install-command:
        description: 'Install command; empty = derive from package-manager'
        type: string
        default: ''
      lint-command:
        description: 'Lint command (empty string skips the step)'
        type: string
        default: 'npm run lint'
      typecheck-command:
        description: 'Typecheck command (empty string skips the step)'
        type: string
        default: 'npm run typecheck'
      build-command:
        description: 'Build command (empty string skips the step)'
        type: string
        default: 'npm run build'
      test-command:
        description: 'Test command (empty string skips the step)'
        type: string
        default: 'npm test'
      check-lockfile-hygiene:
        description: 'Run the ADR 1634 Rule 3b lockfile gate (detect + clean-room resolve)'
        type: boolean
        default: true
      timeout-minutes:
        description: 'Timeout for the test job'
        type: number
        default: 20

permissions:
  contents: read
  id-token: write

env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}

jobs:
  # ADR 1634 Rule 3b, half 1 of 2 — DETECT. Fail closed if any tracked lockfile
  # or resolver config names a non-public registry host (a lockfile pinned to
  # internal Artifactory silently breaks external installs). Secret-less: runs
  # identically on fork and same-repo PRs. Covers npm/yarn/pnpm, single + mono.
  lockfile-scan:
    name: Lockfile scan
    if: ${{ inputs.check-lockfile-hygiene }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan lockfiles/configs for non-public registry hosts
        shell: bash
        run: |
          # Public hosts an external consumer can reach. Anything else (Twilio
          # Artifactory, internal GHE, other private registries) fails the gate.
          ALLOW='registry\.npmjs\.org|registry\.yarnpkg\.com|github\.com|codeload\.github\.com'
          BAD=""
          FOUND=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            FOUND=1
            HOSTS=$(grep -oE 'https?://[^"'\'' ),]+' "$f" 2>/dev/null \
              | sed -E 's#^(https?://[^/]+).*#\1#' | sort -u)
            for h in $HOSTS; do
              echo "$h" | grep -qE "://($ALLOW)$" || BAD="${BAD}${f}: ${h}"$'\n'
            done
          done < <(git ls-files \
            '*package-lock.json' '*npm-shrinkwrap.json' '*yarn.lock' '*pnpm-lock.yaml' \
            '.npmrc' '**/.npmrc' '.yarnrc.yml' '**/.yarnrc.yml' 2>/dev/null)
          if [ "$FOUND" -eq 0 ]; then
            echo "::notice::no lockfiles or resolver configs tracked; nothing to scan"
            exit 0
          fi
          if [ -n "$BAD" ]; then
            echo "::error::Non-public registry hosts found; external consumers cannot install. Rewrite these to registry.npmjs.org:"
            printf '%s' "$BAD"
            exit 1
          fi
          echo "::notice::lockfile scan OK — all resolved hosts are public"

  # ADR 1634 Rule 3b, half 2 of 2 — CLEAN-ROOM RESOLVE. Prove the committed
  # lockfile installs from PUBLIC registries only (no Artifactory, no OIDC, no
  # secrets), exactly as an external consumer would. A lockfile pinned to an
  # unreachable host fails fast here instead of shipping broken to consumers.
  clean-room-install:
    name: Clean-room public install
    if: ${{ inputs.check-lockfile-hygiene }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enable corepack
        if: ${{ inputs.package-manager == 'yarn' || inputs.package-manager == 'pnpm' }}
        shell: bash
        run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: ${{ inputs.package-manager }}
      - name: Install against public registry only
        shell: bash
        env:
          PM: ${{ inputs.package-manager }}
          INSTALL_OVERRIDE: ${{ inputs.install-command }}
          # Force public registry and fail fast rather than hang on an
          # unreachable internal host.
          npm_config_registry: https://registry.npmjs.org/
          npm_config_fetch_retries: '1'
          npm_config_fetch_timeout: '60000'
        run: |
          if [ -n "$INSTALL_OVERRIDE" ]; then
            eval "$INSTALL_OVERRIDE"
          else
            case "$PM" in
              npm)  npm ci --ignore-scripts ;;
              yarn) yarn install --frozen-lockfile ;;
              pnpm) pnpm install --frozen-lockfile ;;
              *) echo "::error::unknown package-manager '$PM'"; exit 1 ;;
            esac
          fi
          echo "::notice::clean-room public install succeeded"

  test:
    name: Test - Node ${{ matrix.node }}
    # Internal Artifactory runners for org builds; forks fall back to GitHub-hosted.
    runs-on: ${{ github.event.pull_request.head.repo.fork && 'ubuntu-latest' || inputs.org-runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable corepack
        if: ${{ inputs.package-manager == 'yarn' || inputs.package-manager == 'pnpm' }}
        shell: bash
        run: corepack enable

      # Forks have no secret to auth Artifactory; they resolve from public npm.
      - name: Artifactory OIDC Auth
        if: ${{ !github.event.pull_request.head.repo.fork }}
        shell: bash
        run: |
          # 1. Request a GitHub JWT scoped to Artifactory as the audience.
          GITHUB_JWT=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${ARTIFACTORY_URL}" \
            | jq -r '.value')

          PAYLOAD=$(echo "$GITHUB_JWT" | cut -d. -f2 | sed 's/-/+/g; s/_/\//g' | base64 -d 2>/dev/null || true)
          echo "::debug::OIDC claims: sub=$(echo "$PAYLOAD" | jq -r '.sub'), aud=$(echo "$PAYLOAD" | jq -r '.aud')"

          # 2. Exchange the GitHub JWT for an Artifactory access token.
          RESP=$(curl -sS "${ARTIFACTORY_URL}/access/api/v1/oidc/token" \
            -H 'Content-Type: application/json' \
            -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:token-exchange\",
                 \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\",
                 \"subject_token\":\"${GITHUB_JWT}\",
                 \"provider_name\":\"github-actions\"}")
          ART_TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')

          if [ -z "$ART_TOKEN" ]; then
            echo "::error::OIDC token exchange failed. Raw response (token field redacted):"
            echo "$RESP" | jq 'if .access_token then .access_token="<redacted>" else . end' 2>/dev/null || echo "$RESP"
            exit 1
          fi
          echo "::add-mask::$ART_TOKEN"

          # 3. Point npm/yarn/pnpm at the curated Artifactory registry (all read ~/.npmrc;
          #    yarn Berry additionally needs .yarnrc.yml — set npmRegistryServer there).
          REGISTRY="${ARTIFACTORY_URL}/artifactory/api/npm/virtual-npm-thirdparty/"
          HOST=$(echo "${ARTIFACTORY_URL}" | sed -E 's#^https?://##')
          {
            echo "registry=${REGISTRY}"
            echo "//${HOST}/artifactory/api/npm/virtual-npm-thirdparty/:_authToken=${ART_TOKEN}"
          } > ~/.npmrc
          echo "::notice::npm configured to use Artifactory registry"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        shell: bash
        env:
          PM: ${{ inputs.package-manager }}
          INSTALL_OVERRIDE: ${{ inputs.install-command }}
        run: |
          if [ -n "$INSTALL_OVERRIDE" ]; then
            eval "$INSTALL_OVERRIDE"
          else
            case "$PM" in
              npm)  npm ci --ignore-scripts ;;
              yarn) yarn install --frozen-lockfile ;;
              pnpm) pnpm install --frozen-lockfile ;;
              *) echo "::error::unknown package-manager '$PM'"; exit 1 ;;
            esac
          fi

      - name: Lint
        if: ${{ inputs.lint-command != '' }}
        run: ${{ inputs.lint-command }}

      - name: Typecheck
        if: ${{ inputs.typecheck-command != '' }}
        run: ${{ inputs.typecheck-command }}

      - name: Build
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      - name: Test
        if: ${{ inputs.test-command != '' }}
        run: ${{ inputs.test-command }}
