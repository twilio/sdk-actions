name: Lerna Publish (reusable)

# Centralized, versioned publish guard for a Lerna MONOREPO that publishes many
# packages (ADR 1634). For a single-package repo use node-publish.yml instead.
#
# Publishes to PUBLIC npm via OIDC trusted publishing; Artifactory resolves deps
# only. Unlike node-publish.yml there is NO single tag<->version check: a Lerna
# repo (especially independent-versioning) has many package versions, so the tag
# is not authoritative. Version bumps are expected to be committed already; the
# default publishes the packages whose versions are not yet on the registry
# (`lerna publish from-package`).
#
#   on:
#     release:
#       types: [published]
#   jobs:
#     publish:
#       uses: twilio/sdk-actions/.github/workflows/lerna-publish.yml@<sha>  # v1.2.3
#       permissions:
#         contents: read
#         id-token: write
#       with:
#         package-manager: yarn
#         # publish-command: 'npx lerna publish from-git --yes'   # if you tag versions
#         # provenance: false   # REQUIRED for private (twilio-internal/*) sources
#
# NOTE: each published package needs its OWN npm trusted-publisher binding
# (owner/repo + this workflow filename + the `environment`). Register one per
# package name, all pointing at lerna-publish.yml + `production`.

on:
  workflow_call:
    inputs:
      package-manager:
        description: 'npm | yarn | pnpm (build/test tooling; publish is via lerna->npm)'
        type: string
        default: 'npm'
      node-versions:
        description: 'JSON array of Node versions for the pre-publish test matrix'
        type: string
        default: '[22, 24]'
      org-owner:
        description: 'repository_owner that is allowed to publish (guard)'
        type: string
        default: 'twilio'
      org-runner:
        description: 'Runner label for the org build/publish jobs'
        type: string
        default: 'ubuntu-x64'
      environment:
        description: 'GitHub Environment gating the deploy (must match npm trusted publisher)'
        type: string
        default: 'production'
      provenance:
        description: 'Attach npm provenance (must be false on private source repos)'
        type: boolean
        default: true
      publish-command:
        description: 'Lerna publish command; the default publishes unpublished package versions'
        type: string
        default: 'npx lerna publish from-package --yes'
      publish-node-version:
        description: 'Node version for the publish job (>= 24 for npm OIDC trusted publishing)'
        type: string
        default: '24'
      install-command:
        description: 'Install command; empty = derive from package-manager'
        type: string
        default: ''
      lint-command:
        description: 'Lint command in the pre-publish test job (empty skips)'
        type: string
        default: 'npm run lint'
      typecheck-command:
        description: 'Typecheck command in the pre-publish test job (empty skips)'
        type: string
        default: 'npm run typecheck'
      build-command:
        description: 'Build command (empty skips)'
        type: string
        default: 'npm run build'
      test-command:
        description: 'Test command in the pre-publish test job (empty skips)'
        type: string
        default: 'npm test'

permissions:
  contents: read
  id-token: write

env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}

jobs:
  test:
    name: Test - Node ${{ matrix.node }}
    runs-on: ${{ inputs.org-runner }}
    if: github.repository_owner == inputs.org-owner
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable corepack
        if: ${{ inputs.package-manager == 'yarn' || inputs.package-manager == 'pnpm' }}
        shell: bash
        run: corepack enable

      - name: Artifactory OIDC Auth
        shell: bash
        run: |
          GITHUB_JWT=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${ARTIFACTORY_URL}" \
            | jq -r '.value')
          RESP=$(curl -sS "${ARTIFACTORY_URL}/access/api/v1/oidc/token" \
            -H 'Content-Type: application/json' \
            -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:token-exchange\",
                 \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\",
                 \"subject_token\":\"${GITHUB_JWT}\",
                 \"provider_name\":\"github-actions\"}")
          ART_TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')
          if [ -z "$ART_TOKEN" ]; then
            echo "::error::OIDC token exchange failed. Raw response (token field redacted):"
            echo "$RESP" | jq 'if .access_token then .access_token="<redacted>" else . end' 2>/dev/null || echo "$RESP"
            exit 1
          fi
          echo "::add-mask::$ART_TOKEN"
          REGISTRY="${ARTIFACTORY_URL}/artifactory/api/npm/virtual-npm-thirdparty/"
          HOST=$(echo "${ARTIFACTORY_URL}" | sed -E 's#^https?://##')
          {
            echo "registry=${REGISTRY}"
            echo "//${HOST}/artifactory/api/npm/virtual-npm-thirdparty/:_authToken=${ART_TOKEN}"
          } > ~/.npmrc
          echo "::notice::npm configured to use Artifactory registry"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        shell: bash
        env:
          PM: ${{ inputs.package-manager }}
          INSTALL_OVERRIDE: ${{ inputs.install-command }}
        run: |
          if [ -n "$INSTALL_OVERRIDE" ]; then
            eval "$INSTALL_OVERRIDE"
          else
            case "$PM" in
              npm)  npm ci --ignore-scripts ;;
              yarn) yarn install --frozen-lockfile ;;
              pnpm) pnpm install --frozen-lockfile ;;
              *) echo "::error::unknown package-manager '$PM'"; exit 1 ;;
            esac
          fi

      - name: Lint
        if: ${{ inputs.lint-command != '' }}
        run: ${{ inputs.lint-command }}

      - name: Typecheck
        if: ${{ inputs.typecheck-command != '' }}
        run: ${{ inputs.typecheck-command }}

      - name: Build
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      - name: Test
        if: ${{ inputs.test-command != '' }}
        run: ${{ inputs.test-command }}

  deploy:
    name: Publish packages to npm
    needs: [test]
    runs-on: ${{ inputs.org-runner }}
    if: github.repository_owner == inputs.org-owner
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Lerna's from-git / version detection needs full history + tags.
          fetch-depth: 0

      - name: Enable corepack
        if: ${{ inputs.package-manager == 'yarn' || inputs.package-manager == 'pnpm' }}
        shell: bash
        run: corepack enable

      - name: Artifactory OIDC Auth
        shell: bash
        run: |
          GITHUB_JWT=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${ARTIFACTORY_URL}" \
            | jq -r '.value')
          RESP=$(curl -sS "${ARTIFACTORY_URL}/access/api/v1/oidc/token" \
            -H 'Content-Type: application/json' \
            -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:token-exchange\",
                 \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\",
                 \"subject_token\":\"${GITHUB_JWT}\",
                 \"provider_name\":\"github-actions\"}")
          ART_TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')
          if [ -z "$ART_TOKEN" ]; then
            echo "::error::OIDC token exchange failed. Raw response (token field redacted):"
            echo "$RESP" | jq 'if .access_token then .access_token="<redacted>" else . end' 2>/dev/null || echo "$RESP"
            exit 1
          fi
          echo "::add-mask::$ART_TOKEN"
          REGISTRY="${ARTIFACTORY_URL}/artifactory/api/npm/virtual-npm-thirdparty/"
          HOST=$(echo "${ARTIFACTORY_URL}" | sed -E 's#^https?://##')
          {
            echo "registry=${REGISTRY}"
            echo "//${HOST}/artifactory/api/npm/virtual-npm-thirdparty/:_authToken=${ART_TOKEN}"
          } > ~/.npmrc
          echo "::notice::npm configured to use Artifactory registry"

      # Node 24+ required for npm OIDC trusted publisher support (npm >= 11.5.1).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.publish-node-version }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        shell: bash
        env:
          PM: ${{ inputs.package-manager }}
          INSTALL_OVERRIDE: ${{ inputs.install-command }}
        run: |
          if [ -n "$INSTALL_OVERRIDE" ]; then
            eval "$INSTALL_OVERRIDE"
          else
            case "$PM" in
              npm)  npm ci --ignore-scripts ;;
              yarn) yarn install --frozen-lockfile ;;
              pnpm) pnpm install --frozen-lockfile ;;
              *) echo "::error::unknown package-manager '$PM'"; exit 1 ;;
            esac
          fi

      - name: Build
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      - name: Publish packages via lerna
        # lerna shells out to `npm publish` per package. npm_config_provenance
        # toggles provenance for those child publishes (false on private repos).
        shell: bash
        env:
          PUBLISH_COMMAND: ${{ inputs.publish-command }}
          npm_config_provenance: ${{ inputs.provenance }}
          npm_config_access: public
          npm_config_registry: https://registry.npmjs.org/
        run: |
          eval "$PUBLISH_COMMAND"
